name: Deploy to Server

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/CloudSystems
            git fetch origin
            git reset --hard origin/main
git 
            cd my-app
            sudo docker build --no-cache -t my-app .

            sudo docker rm -f my-app || true

            sudo docker run -d -p 3000:3000 --name my-app my-app
